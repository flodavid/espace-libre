id: fr.flodavid.espaceLibre
runtime: io.elementary.Platform
runtime-version: 'daily'
sdk: io.elementary.Sdk
command: fr.flodavid.espaceLibre
finish-args:
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--socket=wayland'
  - '--device=dri'
  - '--filesystem=host-etc:ro'

modules:
  - name: espaceLibre
    buildsystem: meson
    sources:
      - type: dir
        path: .
